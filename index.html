<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Ngakan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@8..144,400..600&display=swap"
    rel="stylesheet">

  <link rel="shortcut icon" href="favicon.svg" type="image/svg+xml">

  <style>
    :root {
      --bg-color: #ffffff98;
      --text-color: #000000;
      --glass-bg: rgba(255, 255, 255, 0.096);
      --glass-border: rgba(255, 255, 255, 0.5);
      --mono-font: 'Google Sans Flex', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-color);
      color: var(--text-color);
      font-family: 'Google Sans Flex', sans-serif;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .bottom-bar {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 48px);
      max-width: 1200px;
      height: 60px;
      z-index: 10;

      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;

      background: var(--glass-bg);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.04),
        0 1px 2px rgba(0, 0, 0, 0.02);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: #000000;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      animation: pulse 2s infinite;
      cursor: pointer;
      transition: transform 0.3s ease, background 0.5s ease, box-shadow 0.5s ease;
      position: relative;
      z-index: 100;
    }

    .status-dot:hover {
      transform: scale(1.3);
    }

    .status-dot.active-alt {
      background: #21918c;
      box-shadow: 0 0 15px rgba(33, 145, 140, 0.4);
    }

    @keyframes pulse {
      0% {
        opacity: 0.4;
      }

      50% {
        opacity: 1;
      }

      100% {
        opacity: 0.4;
      }
    }

    .portfolio {
      position: relative;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-color);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 4px;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      opacity: 0.8;
    }

    .portfolio:hover {
      opacity: 1;
      gap: 16px;
    }

    .portfolio-text {
      position: relative;
    }

    .portfolio-text::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0%;
      height: 1px;
      background: currentColor;
      transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      opacity: 0.3;
    }

    .portfolio:hover .portfolio-text::after {
      width: 100%;
    }

    .portfolio-arrow {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 50%;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .portfolio:hover .portfolio-arrow {
      background: #000;
      border-color: #000;
      color: #fff;
      transform: rotate(-45deg);
    }

    .portfolio-arrow svg {
      width: 10px;
      height: 10px;
    }

    .legend {
      position: absolute;
      bottom: 104px;
      left: 32px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      opacity: 0.8;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .legend-colors {
      display: flex;
      gap: 4px;
    }

    .legend-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .legend-label {
      opacity: 0.6;
    }

    @media (max-width: 600px) {
      .bottom-bar {
        padding: 0 20px;
        height: 56px;
        bottom: 16px;
        width: calc(100% - 32px);
      }

      .legend {
        left: 20px;
        bottom: 84px;
      }

      h1 {
        font-size: 16px;
      }

      .portfolio {
        font-size: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <canvas id="bg"></canvas>
    <div class="legend" id="legend">
      <!-- Content populated by JS -->
    </div>
    <div class="bottom-bar">
      <div class="brand">
        <div class="status-dot" id="status-dot"></div>
        <h1>Ngakan</h1>
      </div>
      <a class="portfolio" href="https://page.ngakan.com">
        <span class="portfolio-text">not a product yet</span>
        <div class="portfolio-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="7" y1="17" x2="17" y2="7"></line>
            <polyline points="7 7 17 7 17 17"></polyline>
          </svg>
        </div>
      </a>
    </div>
  </div>
  <script src="main.js"></script>
  <script>
    // Global Simulation Toggle
    const statusDot = document.getElementById('status-dot');
    const legend = document.getElementById('legend');
    let currentSimulation = 'flock'; // 'flock' or 'pandemic'

    const LEGENDS = {
      flock: `
        <div class="legend-item">
          <div class="legend-colors">
            <div class="legend-dot" style="background: #21918c"></div>
            <div class="legend-dot" style="background: #fde725"></div>
          </div>
          <span class="legend-label">Population</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background: #000000"></div>
          <span class="legend-label">Predator</span>
        </div>
      `,
      pandemic: `
        <div class="legend-item">
          <div class="legend-dot" style="background: #21918c"></div>
          <span class="legend-label">Healthy</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background: #440154"></div>
          <span class="legend-label">Infected</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background: #fde725"></div>
          <span class="legend-label">Recovered</span>
        </div>
      `
    };

    function updateLegend() {
      legend.style.opacity = '0';
      setTimeout(() => {
        legend.innerHTML = LEGENDS[currentSimulation];
        legend.style.opacity = '0.8';
      }, 300);
    }

    // Initialize legend
    updateLegend();

    statusDot.addEventListener('click', async () => {
      statusDot.classList.toggle('active-alt');

      if (currentSimulation === 'flock') {
        currentSimulation = 'pandemic';
        updateLegend();
        console.log('Switching to Pandemic simulation...');

        // Stop the boid animation
        if (window.appInstance) {
          window.appInstance.stop();
        }

        // Load and start pandemic if not already loaded
        if (!window.PandemicApp) {
          const script = document.createElement('script');
          script.src = 'pandemic.js';
          script.onload = () => {
            window.pandemicInstance = new window.PandemicApp();
          };
          document.body.appendChild(script);
        } else {
          if (!window.pandemicInstance) {
            window.pandemicInstance = new window.PandemicApp();
          } else {
            window.pandemicInstance.start();
          }
        }
      } else {
        currentSimulation = 'flock';
        updateLegend();
        console.log('Switching to Boid simulation...');

        // Stop pandemic
        if (window.pandemicInstance) {
          window.pandemicInstance.stop();
        }

        // Restart boids
        if (window.appInstance) {
          window.appInstance.start();
        }
      }
    });

    // Provide instance access
    document.addEventListener('DOMContentLoaded', () => {
      // Small delay to ensure main.js App is initialized
      setTimeout(() => {
        if (!window.appInstance && window.App) {
          // Check if it's already running via main.js DOMContentLoaded
        }
      }, 100);
    });
  </script>
</body>

</html>
